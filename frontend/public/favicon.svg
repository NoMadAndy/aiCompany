<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Neural network / brain icon -->
  <g transform="translate(256,256)" fill="none" stroke="url(#brain)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central node -->
    <circle cx="0" cy="0" r="24" fill="url(#brain)" stroke="none"/>
    <!-- Outer nodes -->
    <circle cx="-80" cy="-80" r="16" fill="url(#brain)" stroke="none"/>
    <circle cx="80" cy="-80" r="16" fill="url(#brain)" stroke="none"/>
    <circle cx="-100" cy="30" r="16" fill="url(#brain)" stroke="none"/>
    <circle cx="100" cy="30" r="16" fill="url(#brain)" stroke="none"/>
    <circle cx="-40" cy="100" r="16" fill="url(#brain)" stroke="none"/>
    <circle cx="40" cy="100" r="16" fill="url(#brain)" stroke="none"/>
    <circle cx="0" cy="-110" r="16" fill="url(#brain)" stroke="none"/>
    <!-- Connections -->
    <line x1="0" y1="0" x2="-80" y2="-80" opacity="0.6"/>
    <line x1="0" y1="0" x2="80" y2="-80" opacity="0.6"/>
    <line x1="0" y1="0" x2="-100" y2="30" opacity="0.6"/>
    <line x1="0" y1="0" x2="100" y2="30" opacity="0.6"/>
    <line x1="0" y1="0" x2="-40" y2="100" opacity="0.6"/>
    <line x1="0" y1="0" x2="40" y2="100" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-110" opacity="0.6"/>
    <!-- Cross connections -->
    <line x1="-80" y1="-80" x2="0" y2="-110" opacity="0.3"/>
    <line x1="80" y1="-80" x2="0" y2="-110" opacity="0.3"/>
    <line x1="-80" y1="-80" x2="-100" y2="30" opacity="0.3"/>
    <line x1="80" y1="-80" x2="100" y2="30" opacity="0.3"/>
    <line x1="-100" y1="30" x2="-40" y2="100" opacity="0.3"/>
    <line x1="100" y1="30" x2="40" y2="100" opacity="0.3"/>
    <line x1="-40" y1="100" x2="40" y2="100" opacity="0.3"/>
  </g>
  <!-- AI Text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="72" fill="white" opacity="0.9">AI CO</text>
</svg>
