services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://aicompany:aicompany@db:5432/aicompany}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - WORKER_URL=${WORKER_URL:-http://worker:8080}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://aicompany.macherwerkstatt.cc}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://aicompany.macherwerkstatt.cc}
      - SESSION_SECRET=${SESSION_SECRET:-aicompany-secret-change-me}
    volumes:
      - ./frontend/src:/app/src
      - ./CHANGELOG.md:/app/CHANGELOG.md:ro
      - ./version.json:/app/version.json:ro
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aicompany

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://aicompany:aicompany@db:5432/aicompany}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LOCAL_MODEL=${LOCAL_MODEL:-Qwen/Qwen2.5-3B-Instruct}
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - SESSION_SECRET=${SESSION_SECRET:-aicompany-secret-change-me}
    volumes:
      - ./worker:/app
      - ./frontend/src:/app/frontend-src
      - worker-data:/app/data
      - app-logs:/app/logs
      - model-cache:/app/models
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aicompany

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-aicompany}
      - POSTGRES_USER=${POSTGRES_USER:-aicompany}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aicompany}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/migrate-002-features.sql:/docker-entrypoint-initdb.d/02-features.sql
      - ./scripts/migrate-003-summaries.sql:/docker-entrypoint-initdb.d/03-summaries.sql
      - ./scripts/migrate-004-docker-deploy.sql:/docker-entrypoint-initdb.d/04-docker-deploy.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aicompany}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aicompany

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aicompany

  watcher:
    image: node:18-alpine
    working_dir: /watch
    command: >-
      sh -c "apk add --no-cache docker-cli &&
      npm install -g chokidar-cli &&
      sh /watch/scripts/watcher.sh"
    volumes:
      - ./frontend/src:/watch/frontend/src:ro
      - ./worker:/watch/worker:ro
      - ./scripts/watcher.sh:/watch/scripts/watcher.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - aicompany

volumes:
  postgres_data:
  redis_data:
  worker-data:
  app-logs:
  model-cache:

networks:
  aicompany:
    driver: bridge
